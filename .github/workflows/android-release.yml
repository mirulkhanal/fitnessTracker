name: Android Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      variant:
        description: APK build variant (release is production-like; debug skips R8 for faster CI)
        required: true
        default: release
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPO_PUBLIC_WRAUTH_API_URL: ${{ secrets.EXPO_PUBLIC_WRAUTH_API_URL }}
      EXPO_PUBLIC_WRAUTH_APP_KEY: ${{ secrets.EXPO_PUBLIC_WRAUTH_APP_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate required secrets
        run: |
          if [ -z "$EXPO_PUBLIC_WRAUTH_API_URL" ] || [ -z "$EXPO_PUBLIC_WRAUTH_APP_KEY" ]; then
            echo "::error::Missing GitHub secrets: EXPO_PUBLIC_WRAUTH_API_URL or EXPO_PUBLIC_WRAUTH_APP_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify Expo SDK dependency versions
        run: pnpm verify:expo

      - name: Write .env for native build
        run: |
          printf 'EXPO_PUBLIC_WRAUTH_API_URL=%s\n' "$EXPO_PUBLIC_WRAUTH_API_URL" > .env
          printf 'EXPO_PUBLIC_WRAUTH_APP_KEY=%s\n' "$EXPO_PUBLIC_WRAUTH_APP_KEY" >> .env

      - name: Cache Android SDK and Gradle
        uses: actions/cache@v4
        with:
          path: |
            .android-sdk
            .gradle-local
          key: android-${{ runner.os }}-${{ hashFiles('scripts/setup-android-sdk.sh') }}
          restore-keys: |
            android-${{ runner.os }}-

      - name: Setup Android SDK
        run: pnpm setup:android-sdk

      - name: Set build variant
        id: variant
        run: |
          VALUE="${{ github.event_name == 'workflow_dispatch' && inputs.variant || 'release' }}"
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Build APK locally
        env:
          NODE_ENV: production
        run: |
          source .android-sdk.env
          if [ "${{ steps.variant.outputs.value }}" = "release" ]; then
            pnpm build:android:local
          else
            pnpm build:android:local:debug
          fi

      - name: Resolve release version
        id: version
        env:
          RELEASE_VARIANT: ${{ steps.variant.outputs.value }}
        run: python3 scripts/resolve-release-version.py

      - name: Publish GitHub Release
        run: |
          APK="$(ls -t dist/fittrack-*.apk | head -1)"
          TAG="${{ steps.version.outputs.tag }}"
          TITLE="${{ steps.version.outputs.release_name }}"
          RELEASE_APK="FitTrack-Progress-${TAG}.apk"
          cp "$APK" "$RELEASE_APK"
          file "$RELEASE_APK"
          unzip -t "$RELEASE_APK" >/dev/null
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md
            gh release upload "$TAG" "$RELEASE_APK" --clobber
          else
            gh release create "$TAG" "$RELEASE_APK" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file release-notes.md
          fi
