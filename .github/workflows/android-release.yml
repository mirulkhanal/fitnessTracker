name: Android Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_WRAUTH_API_URL: ${{ secrets.EXPO_PUBLIC_WRAUTH_API_URL }}
      EXPO_PUBLIC_WRAUTH_APP_KEY: ${{ secrets.EXPO_PUBLIC_WRAUTH_APP_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate secrets
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing GitHub secret: EXPO_TOKEN"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_WRAUTH_API_URL" ] || [ -z "$EXPO_PUBLIC_WRAUTH_APP_KEY" ]; then
            echo "::error::Missing GitHub secrets: EXPO_PUBLIC_WRAUTH_API_URL or EXPO_PUBLIC_WRAUTH_APP_KEY"
            exit 1
          fi

      - name: Build Android APK
        run: |
          PROFILE="${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}"
          echo "Building with profile: $PROFILE"
          pnpm exec eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --wait

      - name: Download APK
        run: |
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          pnpm exec eas build:download \
            --platform android \
            --latest \
            --output "FitTrack-Progress-${VERSION}.apk"
          ls -lh FitTrack-Progress-*.apk

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: FitTrack-Progress-*.apk
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: fittrack-android-apk
          path: FitTrack-Progress-*.apk
          if-no-files-found: error
