name: Android Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_WRAUTH_API_URL: ${{ secrets.EXPO_PUBLIC_WRAUTH_API_URL }}
      EXPO_PUBLIC_WRAUTH_APP_KEY: ${{ secrets.EXPO_PUBLIC_WRAUTH_APP_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release secrets
        run: |
          missing=0
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing GitHub secret EXPO_TOKEN (Expo access token)."
            missing=1
          fi
          if [ -z "$EXPO_PUBLIC_WRAUTH_API_URL" ]; then
            echo "::error::Missing GitHub secret EXPO_PUBLIC_WRAUTH_API_URL."
            missing=1
          fi
          if [ -z "$EXPO_PUBLIC_WRAUTH_APP_KEY" ]; then
            echo "::error::Missing GitHub secret EXPO_PUBLIC_WRAUTH_APP_KEY."
            missing=1
          fi
          exit "$missing"

      - name: Verify EAS login
        run: pnpm exec eas whoami

      - name: Build Android APK
        id: build
        run: |
          set -euo pipefail
          PROFILE="${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}"
          echo "Building with profile: $PROFILE"
          pnpm exec eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --wait 2>&1 | tee eas-build.log
          BUILD_ID=$(pnpm exec eas build:list \
            --platform ANDROID \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json | node -e "
              const rows = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const build = Array.isArray(rows) ? rows[0] : rows;
              if (!build?.id) process.exit(1);
              console.log(build.id);
            ")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          VERSION="${{ github.event.release.tag_name || github.ref_name || 'manual' }}"
          pnpm exec eas build:download \
            --id "${{ steps.build.outputs.build_id }}" \
            --output "FitTrack-Progress-${VERSION}.apk"

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: FitTrack-Progress-*.apk
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: fittrack-android-apk
          path: FitTrack-Progress-*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-log
          path: eas-build.log
          if-no-files-found: ignore
