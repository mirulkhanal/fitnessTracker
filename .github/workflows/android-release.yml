name: Android Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release secrets
        env:
          EXPO_PUBLIC_WRAUTH_API_URL: ${{ secrets.EXPO_PUBLIC_WRAUTH_API_URL }}
          EXPO_PUBLIC_WRAUTH_APP_KEY: ${{ secrets.EXPO_PUBLIC_WRAUTH_APP_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_WRAUTH_API_URL" ] || [ -z "$EXPO_PUBLIC_WRAUTH_APP_KEY" ]; then
            echo "::error::Set GitHub secrets EXPO_PUBLIC_WRAUTH_API_URL and EXPO_PUBLIC_WRAUTH_APP_KEY before building."
            exit 1
          fi

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm

      - name: Build Android APK
        id: build
        env:
          EXPO_PUBLIC_WRAUTH_API_URL: ${{ secrets.EXPO_PUBLIC_WRAUTH_API_URL }}
          EXPO_PUBLIC_WRAUTH_APP_KEY: ${{ secrets.EXPO_PUBLIC_WRAUTH_APP_KEY }}
        run: |
          PROFILE="${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --wait \
            --json > build-output.json
          BUILD_ID=$(node -e "const j=require('./build-output.json'); const b=Array.isArray(j)?j[0]:j; console.log(b.id);")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          VERSION="${{ github.event.release.tag_name || 'manual' }}"
          eas build:download \
            --id "${{ steps.build.outputs.build_id }}" \
            --output "FitTrack-Progress-${VERSION}.apk"

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: FitTrack-Progress-*.apk
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: fittrack-android-apk
          path: FitTrack-Progress-*.apk
          if-no-files-found: error
