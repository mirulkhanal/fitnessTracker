name: Android Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_WRAUTH_API_URL: ${{ secrets.EXPO_PUBLIC_WRAUTH_API_URL }}
      EXPO_PUBLIC_WRAUTH_APP_KEY: ${{ secrets.EXPO_PUBLIC_WRAUTH_APP_KEY }}
    outputs:
      profile: ${{ steps.profile.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate secrets
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing GitHub secret: EXPO_TOKEN"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_WRAUTH_API_URL" ] || [ -z "$EXPO_PUBLIC_WRAUTH_APP_KEY" ]; then
            echo "::error::Missing GitHub secrets: EXPO_PUBLIC_WRAUTH_API_URL or EXPO_PUBLIC_WRAUTH_APP_KEY"
            exit 1
          fi

      - name: Set build profile
        id: profile
        run: |
          VALUE="${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}"
          echo "value=$VALUE" >> $GITHUB_OUTPUT

      - name: Write env file for EAS
        run: |
          echo "EXPO_PUBLIC_WRAUTH_API_URL=$EXPO_PUBLIC_WRAUTH_API_URL" >> .env.eas
          echo "EXPO_PUBLIC_WRAUTH_APP_KEY=$EXPO_PUBLIC_WRAUTH_APP_KEY" >> .env.eas

      - name: Build Android APK
        run: |
          echo "Building with profile: ${{ steps.profile.outputs.value }}"
          pnpm exec eas build \
            --platform android \
            --profile "${{ steps.profile.outputs.value }}" \
            --non-interactive \
            --wait \
            --env-file .env.eas

  download-and-release:
    needs: build-android
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download APK
        run: |
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          PROFILE="${{ needs.build-android.outputs.profile }}"
          BUILD_URL=$(pnpm exec eas build:list \
            --platform android \
            --profile "$PROFILE" \
            --limit 1 \
            --json \
            --non-interactive \
            | jq -r '.[0].artifacts.applicationArchiveUrl')
          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "::error::Failed to get APK download URL from EAS"
            exit 1
          fi
          echo "Downloading APK from: $BUILD_URL"
          curl -L --fail "$BUILD_URL" -o "FitTrack-Progress-${VERSION}.apk"
          ls -lh FitTrack-Progress-*.apk

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: FitTrack-Progress-*.apk
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: fittrack-android-apk
          path: FitTrack-Progress-*.apk
          if-no-files-found: error
